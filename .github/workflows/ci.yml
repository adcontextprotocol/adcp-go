name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ["1.22", "1.23"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Test root module
        run: go test -race -count=1 ./...

      - name: Test router
        working-directory: router
        run: go test -race -count=1 ./...

      - name: Test context agent
        working-directory: reference/context-agent
        run: go test -race -count=1 ./...

      - name: Test identity agent
        working-directory: reference/identity-agent
        run: go test -race -count=1 ./...

      - name: Test e2e
        working-directory: e2e
        run: go test -race -count=1 ./...

      - name: Test bench module
        working-directory: bench
        run: go test -race -count=1 ./...

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Run golangci-lint (root)
        uses: golangci/golangci-lint-action@v6
        with:
          version: v2.1
          args: ./...

      - name: Run golangci-lint (router)
        uses: golangci/golangci-lint-action@v6
        with:
          version: v2.1
          working-directory: router
          args: ./...

      - name: Run golangci-lint (context agent)
        uses: golangci/golangci-lint-action@v6
        with:
          version: v2.1
          working-directory: reference/context-agent
          args: ./...

      - name: Run golangci-lint (identity agent)
        uses: golangci/golangci-lint-action@v6
        with:
          version: v2.1
          working-directory: reference/identity-agent
          args: ./...

  benchmark:
    name: Benchmark
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/checkout@v4
        with:
          ref: main
          path: _base

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Benchmark PR
        working-directory: bench
        run: go test -bench=. -benchmem -count=5 ./... | tee /tmp/bench-pr.txt

      - name: Benchmark main
        working-directory: _base/bench
        run: go test -bench=. -benchmem -count=5 ./... | tee /tmp/bench-main.txt

      - name: Install benchstat
        run: go install golang.org/x/perf/cmd/benchstat@latest

      - name: Compare benchmarks
        run: |
          benchstat /tmp/bench-main.txt /tmp/bench-pr.txt | tee /tmp/benchstat.txt

      - name: Post benchmark comparison
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const result = fs.readFileSync('/tmp/benchstat.txt', 'utf8');
            const body = `## Benchmark Comparison (vs main)\n\n\`\`\`\n${result}\n\`\`\``;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.startsWith('## Benchmark Comparison'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
